# /vendor/ — ПЕРЕД location / в server {} cloud.lbl3d.info и lbl3d.info
# root (не alias + try_files): иначе 500 или HTML вместо woff2 → «download failed» в Chrome.

# Явно woff2 (без query ?v= в имени файла на диске)
location ~* ^/vendor/fonts/.+\.woff2$ {
    root /home/site/frontend;
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
    add_header Access-Control-Allow-Origin "*" always;
    access_log off;
    types { font/woff2 woff2; }
    default_type font/woff2;
}

location ^~ /vendor/ {
    root /home/site/frontend;
    expires 7d;
    # Не immutable: при 404/HTML браузер кэширует «битый» woff2 на месяцы
    add_header Cache-Control "public, max-age=604800" always;
    add_header Access-Control-Allow-Origin "*" always;
    access_log off;
    types {
        text/css                             css;
        font/woff2                           woff2;
        font/woff                            woff;
        application/javascript               js;
        application/vnd.ms-fontobject        eot;
        application/x-font-ttf               ttf;
    }
    default_type application/octet-stream;
}
