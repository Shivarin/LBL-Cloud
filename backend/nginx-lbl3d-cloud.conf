# LBL Cloud — cloud.lbl3d.info
# nginx 1.18: не смешивать alias с try_files и index на каталоге (500 / index.htmlindex.html).
# HTML (/app/, /pages/billing/) — root + try_files; статика (/app/css/, /vendor/) — alias без try_files.
#
#   cp /home/site/backend/nginx-lbl3d-cloud.conf /etc/nginx/sites-available/lbl3d-cloud
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name cloud.lbl3d.info;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cloud.lbl3d.info;

    ssl_certificate /etc/letsencrypt/live/cloud.lbl3d.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloud.lbl3d.info/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /home/site/frontend/cloud;
    index index.html;

    access_log /var/log/nginx/cloud.lbl3d.info.access.log;
    error_log  /var/log/nginx/cloud.lbl3d.info.error.log warn;

    client_max_body_size 1024M;
    client_body_timeout 3600s;
    send_timeout 3600s;

    include /home/site/backend/nginx-vendor-static.conf;

    # --- Статика (alias без try_files) ---

    location ^~ /cloud/assets/ {
        alias /home/site/frontend/cloud/assets/;
        expires 7d;
        access_log off;
    }

    location ^~ /assets/ {
        alias /home/site/frontend/assets/;
        expires 7d;
        access_log off;
    }

    # Старые пути в CSS (до /cloud/assets/) — те же PNG в cloud/assets/
    location = /assets/cloudscape-hero.png {
        alias /home/site/frontend/cloud/assets/cloudscape-hero.png;
    }
    location = /assets/detail-wide-scene.png {
        alias /home/site/frontend/cloud/assets/detail-wide-scene.png;
    }
    location = /assets/testimonial-avatars.png {
        alias /home/site/frontend/cloud/assets/testimonial-avatars.png;
    }

    location ^~ /js/core/ {
        alias /home/site/frontend/js/core/;
        expires 7d;
        access_log off;
    }

    location ^~ /app/css/ {
        alias /home/site/frontend/pages/file/css/;
        expires 7d;
        access_log off;
    }

    location ^~ /app/js/ {
        alias /home/site/frontend/pages/file/js/;
        expires 7d;
        access_log off;
    }

    location ^~ /pages/profile/css/ {
        alias /home/site/frontend/pages/profile/css/;
        expires 7d;
        access_log off;
    }

    location = /pages/billing {
        return 301 /pages/billing/;
    }

    # billing: root + try_files (alias+index на nginx 1.18 → 500 / index.htmlindex.html)
    location ^~ /pages/billing/ {
        root /home/site/frontend/cloud;
        try_files $uri $uri/ /pages/billing/index.html;
    }

    location = /pages/auth/login {
        alias /home/site/frontend/cloud/pages/auth/login.html;
    }

    location ^~ /pages/auth/ {
        alias /home/site/frontend/cloud/pages/auth/;
    }

    location ^~ /pages/legal/ {
        alias /home/site/frontend/cloud/pages/legal/;
        expires 1d;
        access_log off;
    }

    location = /app {
        return 301 /app/;
    }

    # /app/ SPA: root + try_files (не alias на index.html — nginx 1.18 → 500)
    location ^~ /app/ {
        root /home/site/frontend/pages/file;
        try_files $uri $uri/ /app/index.html;
    }

    # --- API ---

    location /api/ {
        client_max_body_size 1024M;
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # Лендинг (root + try_files — без alias)
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
